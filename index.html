<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bolt.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Prevent browser-level caching of the HTML shell so new deployments are picked up immediately -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Content Security Policy
         connect-src wss: allows user-chosen Nostr relays (any domain).
         connect-src stun: required for WebRTC ICE (Chrome 90+ enforces CSP for ICE server URIs).
         img-src data: blob: required for QR canvas exports and attachment previews.
         media-src blob: data: required for recorded audio playback.
         Note: frame-ancestors must be an HTTP header and cannot be set here;
         GitHub Pages does not support custom response headers. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; connect-src 'self' wss: https://api.microlink.io stun:stun.l.google.com:19302 stun:stun1.l.google.com:19302; media-src 'self' blob: data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; worker-src 'self';" />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="Decentralized chat over Nostr relays" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NostrChat" />
    <title>Nostr Chat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
